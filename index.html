<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>شطرنج متكامل - روبوت ذكي يتجنب الأكل ويحمي قطعه (مستوى متقدم)</title>
    <link rel="icon" href="Basic-images/logo.png">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background-image: url(Basic-images/Background.jpg);
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        .main-menu {
            background: #f5e7d3;
            border-radius: 32px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            margin: 20px;
        }

        .main-menu h1 {
            font-size: 2.6rem;
            color: #3b2a1f;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #c9aa6f;
        }

        .main-menu p {
            color: #4a3727;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .menu-buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .menu-btn {
            background: #6b3e1c;
            border: none;
            padding: 14px 32px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #f9e0a0;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 5px 0 #3f2a13;
        }

        .menu-btn:hover {
            transform: translateY(-2px);
            background: #7e4e28;
            box-shadow: 0 7px 0 #3f2a13;
        }

        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #3f2a13;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            /* padding: 20px; */
            border-radius: 36px;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background-color: #e9dbbd;
            overflow: hidden;
            box-shadow: 0 4px 7px #2b1b0a;
            border: 3px solid #aa7a4a;
            background-image: url(Basic-images/Chessboard.png);
            background-size: cover;
            padding: 22px 22.5px;
        }

        .square {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: end;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            background-size: cover;
            width: 49.5px;
            height: 49.5px;
        }

        .square.light {
            background-color: #f0d9b500;
        }

        .square.dark {
            background-color: #b5886300;
        }

        .square.valid-move::after {
            content: "";
            position: absolute;
            width: 49.5px;
            height: 49.5px;
            background: radial-gradient(circle, rgb(255 255 255 / 0%), rgb(0 0 0 / 36%));
            pointer-events: none;
            box-shadow: 0 0 5px 2px #ffffff inset, 0 0 0px 1px #00000061;
        }

        .piece-img {
            width: 80%;
            height: 60px;
            margin-bottom: 10px;
            object-fit: contain;
            pointer-events: none;
            transition: transform 0.15s ease;
            filter: drop-shadow(0px 0px 0px #000);
            position: relative;
            z-index: 2;
        }

        .piece-moving {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
        }

        .piece-moving img {
            width: 80%;
            height: 60px;
            object-fit: contain;
        }

        .info-panel {
            background: #ffffff12;
            padding: 12px 25px;
            border-radius: 60px;
            color: #eedb9b;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: -webkit-fill-available;
            margin: 0 20px;
        }

        .turn-indicator {
            background: #00000066;
            padding: 5px 18px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        button.action-btn {
            background: #c68b3c;
            border: none;
            padding: 6px 18px;
            border-radius: 32px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: #2c1a0c;
            font-family: inherit;
            transition: 0.1s linear;
        }

        button.action-btn:active {
            transform: scale(0.96);
        }

        .status {
            background: #1f2a1b;
            padding: 6px 18px;
            border-radius: 32px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .modal-content {
            background: #f5e7d3;
            padding: 30px;
            border-radius: 32px;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .promotion-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .promotion-piece {
            cursor: pointer;
            transition: transform 0.2s;
            padding: 10px;
            border-radius: 16px;
            background: #e9dbbd;
        }

        .promotion-piece:hover {
            transform: scale(1.1);
            background: #d4c4a0;
        }

        .promotion-piece img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0px 0px 0px #000);
        }

        .difficulty-select {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            margin: 20px 0;
            border-radius: 12px;
            border: 2px solid #c9aa6f;
            background: #fff;
            font-family: inherit;
        }

        .confirm-btn {
            background: #6b3e1c;
            color: #f9e0a0;
            border: none;
            padding: 10px 30px;
            font-size: 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 650px) {
            .info-panel {
                font-size: 0.9rem;
                gap: 12px;
            }
            .piece-moving {
                width: calc(95vw / 8);
                height: calc(95vw / 8);
            }
            .promotion-piece img {
                width: 40px;
                height: 40px;
            }
        }

        .shadow-img {
            position: absolute;
            bottom: 7px;
            left: 21px;
            width: 63%;
            height: 117%;
            z-index: 1;
            filter: brightness(0) blur(2px);
            opacity: 0.5;
            transform: rotate(28deg);
            pointer-events: none;
            border-radius: 0px 0px 30px 30px;
        }

        .piece-img {
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    (function(){
        let board = Array(8).fill().map(() => Array(8).fill(null));
        let currentTurn = 'white';
        let gameMode = null;
        let selectedRow = null, selectedCol = null;
        let validMoves = [];
        let gameOver = false;
        let winner = null;
        let botDifficulty = 3;
        
        let whiteKingMoved = false;
        let whiteRookA1Moved = false;
        let whiteRookH1Moved = false;
        let blackKingMoved = false;
        let blackRookA8Moved = false;
        let blackRookH8Moved = false;
        
        let isAnimating = false;
        let animationQueue = [];
        let pendingPromotion = null;
        
        const pieceValues = {
            'pawn': 10, 'knight': 30, 'bishop': 30, 'rook': 50, 'queen': 90, 'king': 900
        };
        
        const baseUrl = "https://raw.githubusercontent.com/Eya2d/Chess/refs/heads/main/";

        const imageUrls = {
            white_king:   `${baseUrl}W1.png`,
            white_queen:  `${baseUrl}W2.png`,
            white_rook1:  `${baseUrl}W3.png`,
            white_rook2:  `${baseUrl}W3.png`,
            white_bishop1:`${baseUrl}W4.png`,
            white_bishop2:`${baseUrl}W4.png`,
            white_knight1:`${baseUrl}W5.png`,
            white_knight2:`${baseUrl}W5.png`,
            white_pawn1:  `${baseUrl}W6.png`,
            white_pawn2:  `${baseUrl}W6.png`,
            white_pawn3:  `${baseUrl}W6.png`,
            white_pawn4:  `${baseUrl}W6.png`,
            white_pawn5:  `${baseUrl}W6.png`,
            white_pawn6:  `${baseUrl}W6.png`,
            white_pawn7:  `${baseUrl}W6.png`,
            white_pawn8:  `${baseUrl}W6.png`,
            black_king:   `${baseUrl}B1.png`,
            black_queen:  `${baseUrl}B2.png`,
            black_rook1:  `${baseUrl}B3.png`,
            black_rook2:  `${baseUrl}B3.png`,
            black_bishop1:`${baseUrl}B4.png`,
            black_bishop2:`${baseUrl}B4.png`,
            black_knight1:`${baseUrl}B5.png`,
            black_knight2:`${baseUrl}B5.png`,
            black_pawn1:  `${baseUrl}B6.png`,
            black_pawn2:  `${baseUrl}B6.png`,
            black_pawn3:  `${baseUrl}B6.png`,
            black_pawn4:  `${baseUrl}B6.png`,
            black_pawn5:  `${baseUrl}B6.png`,
            black_pawn6:  `${baseUrl}B6.png`,
            black_pawn7:  `${baseUrl}B6.png`,
            black_pawn8:  `${baseUrl}B6.png`,
        };
        
        let loadedImages = {};
        
        function preloadImages(callback) {
            let total = Object.keys(imageUrls).length;
            let loaded = 0;
            for (let key in imageUrls) {
                const img = new Image();
                img.src = imageUrls[key];
                img.onload = () => { loaded++; if(loaded === total) callback(); };
                img.onerror = () => { loaded++; if(loaded === total) callback(); };
                loadedImages[key] = img;
            }
        }
        
        function assignUniqueImageKeys() {
            const whiteBack = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
            const blackBack = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
            for (let i=0; i<8; i++) {
                let type = whiteBack[i];
                let key = '';
                if(type === 'rook') key = (i===0) ? 'white_rook1' : 'white_rook2';
                else if(type === 'knight') key = (i===1) ? 'white_knight1' : 'white_knight2';
                else if(type === 'bishop') key = (i===2) ? 'white_bishop1' : 'white_bishop2';
                else if(type === 'queen') key = 'white_queen';
                else key = 'white_king';
                if(board[7][i]) board[7][i].imageKey = key;
                
                let blackType = blackBack[i];
                let bkey = '';
                if(blackType === 'rook') bkey = (i===0) ? 'black_rook1' : 'black_rook2';
                else if(blackType === 'knight') bkey = (i===1) ? 'black_knight1' : 'black_knight2';
                else if(blackType === 'bishop') bkey = (i===2) ? 'black_bishop1' : 'black_bishop2';
                else if(blackType === 'queen') bkey = 'black_queen';
                else bkey = 'black_king';
                if(board[0][i]) board[0][i].imageKey = bkey;
            }
            for(let i=0;i<8;i++) {
                if(board[6][i]) board[6][i].imageKey = `white_pawn${i+1}`;
                if(board[1][i]) board[1][i].imageKey = `black_pawn${i+1}`;
            }
        }
        
        function initBoardData() {
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) board[i][j]=null;
            for(let i=0;i<8;i++) {
                board[1][i] = { type:'pawn', color:'black' };
                board[6][i] = { type:'pawn', color:'white' };
            }
            const order = ['rook','knight','bishop','queen','king','bishop','knight','rook'];
            for(let i=0;i<8;i++) {
                board[0][i] = { type: order[i], color:'black' };
                board[7][i] = { type: order[i], color:'white' };
            }
            assignUniqueImageKeys();
            
            whiteKingMoved = false;
            whiteRookA1Moved = false;
            whiteRookH1Moved = false;
            blackKingMoved = false;
            blackRookA8Moved = false;
            blackRookH8Moved = false;
            enPassantTarget = null;
        }
        
        let enPassantTarget = null;
        
        function isValidEnPassant(piece, fromRow, fromCol, toRow, toCol, boardState) {
            if (piece.type !== 'pawn') return false;
            const dir = piece.color === 'white' ? -1 : 1;
            if (toRow === fromRow + dir && Math.abs(toCol - fromCol) === 1) {
                if (enPassantTarget && enPassantTarget.row === fromRow && enPassantTarget.col === toCol) {
                    const targetPawn = boardState[fromRow][toCol];
                    if (targetPawn && targetPawn.type === 'pawn' && targetPawn.color !== piece.color) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        function isValidCastling(piece, fromRow, fromCol, toRow, toCol, boardState) {
            if (piece.type !== 'king') return false;
            if (piece.color === 'white' && fromRow === 7 && fromCol === 4) {
                if (!whiteKingMoved) {
                    if (toRow === 7 && toCol === 6 && !whiteRookH1Moved) {
                        if (boardState[7][5] === null && boardState[7][6] === null) {
                            if (!isSquareAttacked(7,4,'white',boardState) && !isSquareAttacked(7,5,'white',boardState) && !isSquareAttacked(7,6,'white',boardState)) {
                                return true;
                            }
                        }
                    }
                    if (toRow === 7 && toCol === 2 && !whiteRookA1Moved) {
                        if (boardState[7][1] === null && boardState[7][2] === null && boardState[7][3] === null) {
                            if (!isSquareAttacked(7,4,'white',boardState) && !isSquareAttacked(7,3,'white',boardState) && !isSquareAttacked(7,2,'white',boardState)) {
                                return true;
                            }
                        }
                    }
                }
            }
            if (piece.color === 'black' && fromRow === 0 && fromCol === 4) {
                if (!blackKingMoved) {
                    if (toRow === 0 && toCol === 6 && !blackRookH8Moved) {
                        if (boardState[0][5] === null && boardState[0][6] === null) {
                            if (!isSquareAttacked(0,4,'black',boardState) && !isSquareAttacked(0,5,'black',boardState) && !isSquareAttacked(0,6,'black',boardState)) {
                                return true;
                            }
                        }
                    }
                    if (toRow === 0 && toCol === 2 && !blackRookA8Moved) {
                        if (boardState[0][1] === null && boardState[0][2] === null && boardState[0][3] === null) {
                            if (!isSquareAttacked(0,4,'black',boardState) && !isSquareAttacked(0,3,'black',boardState) && !isSquareAttacked(0,2,'black',boardState)) {
                                return true;
                            }
                        }
                    }
                }
            }
            return false;
        }
        
        function isValidPawnMove(piece, fromRow, fromCol, toRow, toCol, boardState) {
            const dir = piece.color === 'white' ? -1 : 1;
            const startRow = piece.color === 'white' ? 6 : 1;
            const target = boardState[toRow][toCol];
            if(fromCol===toCol && !target && toRow===fromRow+dir) return true;
            if(fromCol===toCol && !target && fromRow===startRow && toRow===fromRow+2*dir && !boardState[fromRow+dir][fromCol]) return true;
            if(Math.abs(toCol-fromCol)===1 && toRow===fromRow+dir && target && target.color!==piece.color) return true;
            if(isValidEnPassant(piece, fromRow, fromCol, toRow, toCol, boardState)) return true;
            return false;
        }
        
        function isValidRookMove(fromRow,fromCol,toRow,toCol,boardState){
            if(fromRow!==toRow && fromCol!==toCol) return false;
            if(fromRow===toRow){
                let step = toCol>fromCol?1:-1;
                for(let c=fromCol+step; c!==toCol; c+=step) if(boardState[fromRow][c]) return false;
            } else {
                let step = toRow>fromRow?1:-1;
                for(let r=fromRow+step; r!==toRow; r+=step) if(boardState[r][fromCol]) return false;
            }
            return true;
        }
        
        function isValidBishopMove(fromRow,fromCol,toRow,toCol,boardState){
            if(Math.abs(toRow-fromRow)!==Math.abs(toCol-fromCol)) return false;
            let rStep = toRow>fromRow?1:-1, cStep = toCol>fromCol?1:-1;
            let r=fromRow+rStep, c=fromCol+cStep;
            while(!(r===toRow && c===toCol)){
                if(boardState[r][c]) return false;
                r+=rStep; c+=cStep;
            }
            return true;
        }
        
        function isValidKnightMove(fromRow,fromCol,toRow,toCol){
            let dr=Math.abs(toRow-fromRow), dc=Math.abs(toCol-fromCol);
            return (dr===2 && dc===1) || (dr===1 && dc===2);
        }
        
        function isValidQueenMove(fromRow,fromCol,toRow,toCol,boardState){
            return isValidRookMove(fromRow,fromCol,toRow,toCol,boardState) || isValidBishopMove(fromRow,fromCol,toRow,toCol,boardState);
        }
        
        function isValidKingMove(fromRow,fromCol,toRow,toCol){
            let dr=Math.abs(toRow-fromRow), dc=Math.abs(toCol-fromCol);
            return dr<=1 && dc<=1 && !(dr===0 && dc===0);
        }
        
        function isMoveValidBasic(piece, fromRow, fromCol, toRow, toCol, boardState){
            let target = boardState[toRow][toCol];
            if(target && target.type === 'king') return false;
            if(target && target.color===piece.color) return false;
            if(isValidCastling(piece, fromRow, fromCol, toRow, toCol, boardState)) return true;
            switch(piece.type){
                case 'pawn': return isValidPawnMove(piece,fromRow,fromCol,toRow,toCol,boardState);
                case 'rook': return isValidRookMove(fromRow,fromCol,toRow,toCol,boardState);
                case 'knight': return isValidKnightMove(fromRow,fromCol,toRow,toCol);
                case 'bishop': return isValidBishopMove(fromRow,fromCol,toRow,toCol,boardState);
                case 'queen': return isValidQueenMove(fromRow,fromCol,toRow,toCol,boardState);
                case 'king': return isValidKingMove(fromRow,fromCol,toRow,toCol);
                default: return false;
            }
        }
        
        function copyBoard(b){ return b.map(row=>row.map(cell=>cell ? {...cell} : null)); }
        
        function findKing(color,boardState){
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(boardState[i][j]?.type==='king' && boardState[i][j].color===color) return {row:i, col:j};
            return null;
        }
        
        function isSquareAttacked(row,col,friendlyColor,boardState){
            let opp = friendlyColor==='white'?'black':'white';
            for(let i=0;i<8;i++) for(let j=0;j<8;j++){
                let p = boardState[i][j];
                if(p && p.color===opp) {
                    if(p.type === 'king') {
                        let dr = Math.abs(row-i), dc = Math.abs(col-j);
                        if(dr<=1 && dc<=1) return true;
                    } else if(isMoveValidBasic(p,i,j,row,col,boardState)) return true;
                }
            }
            return false;
        }
        
        function isMoveSafe(piece,fromRow,fromCol,toRow,toCol,boardState){
            let temp = copyBoard(boardState);
            temp[toRow][toCol] = temp[fromRow][fromCol];
            temp[fromRow][fromCol] = null;
            let kingPos = findKing(piece.color,temp);
            if(!kingPos) return true;
            return !isSquareAttacked(kingPos.row,kingPos.col,piece.color,temp);
        }
        
        function getAllValidMoves(color,boardState){
            let moves=[];
            for(let i=0;i<8;i++) for(let j=0;j<8;j++){
                let p=boardState[i][j];
                if(p && p.color===color){
                    for(let ti=0;ti<8;ti++) for(let tj=0;tj<8;tj++){
                        if(isMoveValidBasic(p,i,j,ti,tj,boardState) && isMoveSafe(p,i,j,ti,tj,boardState))
                            moves.push({from:{row:i,col:j},to:{row:ti,col:tj},piece:p});
                    }
                }
            }
            return moves;
        }
        
        function isKingInCheck(color,boardState){
            let kpos = findKing(color,boardState);
            return kpos ? isSquareAttacked(kpos.row,kpos.col,color,boardState) : false;
        }
        
        function isOnlyKingsLeft(boardState) {
            let whiteKingCount = 0, blackKingCount = 0;
            let otherPieces = 0;
            for(let i=0;i<8;i++) {
                for(let j=0;j<8;j++) {
                    const p = boardState[i][j];
                    if(p) {
                        if(p.type === 'king') {
                            if(p.color === 'white') whiteKingCount++;
                            else blackKingCount++;
                        } else {
                            otherPieces++;
                        }
                    }
                }
            }
            return (whiteKingCount === 1 && blackKingCount === 1 && otherPieces === 0);
        }
        
        function getGameState(color,boardState){
            if(isOnlyKingsLeft(boardState)) return 'stalemate';
            let moves = getAllValidMoves(color,boardState);
            if(moves.length>0) return 'playing';
            return isKingInCheck(color,boardState) ? 'checkmate' : 'stalemate';
        }
        
        function applyMoveWithPromotion(fromRow,fromCol,toRow,toCol,promotionPiece=null){
            let piece = board[fromRow][fromCol];
            if(!piece) return false;
            
            let isCastlingMove = (piece.type === 'king' && Math.abs(toCol - fromCol) === 2);
            let isEnPassantMove = (piece.type === 'pawn' && toCol !== fromCol && !board[toRow][toCol]);
            
            let imageKey = piece.imageKey;
            board[toRow][toCol] = {...piece, imageKey};
            board[fromRow][fromCol] = null;
            
            if(isCastlingMove){
                if(piece.color === 'white' && fromRow===7 && fromCol===4){
                    if(toCol === 6){
                        board[7][5] = board[7][7];
                        board[7][7] = null;
                        whiteRookH1Moved = true;
                    } else if(toCol === 2){
                        board[7][3] = board[7][0];
                        board[7][0] = null;
                        whiteRookA1Moved = true;
                    }
                    whiteKingMoved = true;
                } else if(piece.color === 'black' && fromRow===0 && fromCol===4){
                    if(toCol === 6){
                        board[0][5] = board[0][7];
                        board[0][7] = null;
                        blackRookH8Moved = true;
                    } else if(toCol === 2){
                        board[0][3] = board[0][0];
                        board[0][0] = null;
                        blackRookA8Moved = true;
                    }
                    blackKingMoved = true;
                }
            }
            
            if(isEnPassantMove && piece.type === 'pawn'){
                board[fromRow][toCol] = null;
            }
            
            if(piece.type === 'king'){
                if(piece.color === 'white') whiteKingMoved = true;
                else blackKingMoved = true;
            }
            if(piece.type === 'rook'){
                if(piece.color === 'white'){
                    if(fromRow===7 && fromCol===0) whiteRookA1Moved = true;
                    if(fromRow===7 && fromCol===7) whiteRookH1Moved = true;
                } else {
                    if(fromRow===0 && fromCol===0) blackRookA8Moved = true;
                    if(fromRow===0 && fromCol===7) blackRookH8Moved = true;
                }
            }
            
            enPassantTarget = null;
            if(piece.type === 'pawn' && Math.abs(toRow - fromRow) === 2){
                enPassantTarget = { row: (fromRow + toRow)/2, col: fromCol };
            }
            
            let promoteRow = piece.color==='white'?0:7;
            if(piece.type==='pawn' && toRow===promoteRow){
                if(promotionPiece){
                    let promoPiece = { type: promotionPiece, color: piece.color };
                    promoPiece.imageKey = `${piece.color}_${promotionPiece}` + (promotionPiece === 'rook' ? '1' : (promotionPiece === 'knight' ? '1' : (promotionPiece === 'bishop' ? '1' : '')));
                    board[toRow][toCol] = promoPiece;
                } else {
                    pendingPromotion = { row: toRow, col: toCol, color: piece.color, callback: null };
                    return 'need_promotion';
                }
            }
            
            currentTurn = currentTurn==='white'?'black':'white';
            
            if(isOnlyKingsLeft(board)) {
                gameOver = true;
                winner = null;
                return true;
            }
            
            let state = getGameState(currentTurn,board);
            if(state==='checkmate'){ gameOver=true; winner = currentTurn==='white'?'black':'white'; }
            else if(state==='stalemate'){ gameOver=true; winner=null; }
            return true;
        }
        
        function completePromotion(pieceType){
            if(pendingPromotion){
                let {row, col, color} = pendingPromotion;
                let promoPiece = { type: pieceType, color: color };
                promoPiece.imageKey = `${color}_${pieceType}` + (pieceType === 'rook' ? '1' : (pieceType === 'knight' ? '1' : (pieceType === 'bishop' ? '1' : '')));
                board[row][col] = promoPiece;
                pendingPromotion = null;
                renderBoard();
                updateUI();
                if(gameMode==='bot' && !gameOver && currentTurn==='black'){
                    setTimeout(()=>botMove(), 150);
                }
            }
        }
        
        // ========== تحسين متقدم لتقييم الحركة مع مراقبة التهديدات وتجنب الأكل (تعتمد على المستوى) ==========
        // تعاقب الحركة إذا كانت القطعة ستتعرض للأكل بعد التحرك، وتزداد شدة العقاب بازدياد المستوى.
        function evaluateBotMove(move, boardState, difficulty) {
            let score = 0;
            const targetPiece = boardState[move.to.row][move.to.col];
            // 1. أكل قطعة الخصم (مكافأة كبيرة)
            if(targetPiece && targetPiece.color !== move.piece.color) {
                score += pieceValues[targetPiece.type] * 12;
            }
            
            // 2. محاكاة الحركة لمعرفة ما إذا كانت القطعة ستهدد بعد الوصول
            let tempBoard = copyBoard(boardState);
            tempBoard[move.to.row][move.to.col] = tempBoard[move.from.row][move.from.col];
            tempBoard[move.from.row][move.from.col] = null;
            
            // هل القطعة التي حركناها معرضة للهجوم في المربع الجديد؟
            const isPieceAttackedAfterMove = isSquareAttacked(move.to.row, move.to.col, move.piece.color, tempBoard);
            // قيمة القطعة الحالية
            const pieceVal = pieceValues[move.piece.type];
            // معامل الخطر يعتمد على المستوى: كلما زاد المستوى زادت معاقبة تعريض القطعة للأكل
            let dangerFactor = 1 + (difficulty - 1) * 0.6;  // مستوى1=1, مستوى2=1.6, مستوى3=2.2, مستوى4=2.8, مستوى5=3.4
            if (isPieceAttackedAfterMove) {
                // خصم كبير: كلما زاد المستوى كلما زاد تجنب تعريض القطعة للأكل
                score -= pieceVal * (5 + difficulty * 2) * dangerFactor;
            }
            
            // 3. مكافأة التمركز في وسط اللوح
            const center = (move.to.row === 3 || move.to.row === 4) && (move.to.col === 3 || move.to.col === 4);
            if (center) score += 18 * (difficulty / 2);
            
            // 4. تقدم البيادق
            if(move.piece.type === 'pawn') {
                const targetRow = move.to.row;
                if(move.piece.color === 'black' && targetRow > move.from.row) score += (targetRow) * 3;
                if(move.piece.color === 'white' && targetRow < move.from.row) score += (7 - targetRow) * 3;
            }
            
            // 5. تجنب تحريك الملك بدون سبب (عقاب بسيط)
            if(move.piece.type === 'king' && Math.abs(move.to.col - move.from.col) <= 1 && Math.abs(move.to.row - move.from.row) <=1) {
                if(!isKingInCheck(move.piece.color, boardState)) score -= 8 * (difficulty/2);
            }
            
            // 6. ** تحسين جديد: مراقبة التهديدات المستقبلية - إذا تحركت قطعة وفتحت طريقاً لتهديد قطعة أخرى أكثر قيمة **
            // نفحص إذا كانت القطعة المنقولة كانت تحمي قطعة أخرى ذات قيمة أعلى (مثل الملك أو الوزير)
            // نطبق هذا التحليل للمستويات 3 فأعلى
            if (difficulty >= 3) {
                for (let i = 0; i < 8; i++) {
                    for (let j = 0; j < 8; j++) {
                        const p = tempBoard[i][j];
                        if (p && p.color === move.piece.color && p !== tempBoard[move.to.row][move.to.col]) {
                            // هل هذه القطعة معرضة للهجوم بعد الحركة؟
                            if (isSquareAttacked(i, j, move.piece.color, tempBoard)) {
                                // إذا كانت القطعة المهددة ذات قيمة عالية، نخفض النتيجة كثيراً
                                const val = pieceValues[p.type];
                                if (val >= 50) { // وزير أو رخ أو ملك
                                    score -= val * (0.4 * difficulty);
                                } else {
                                    score -= val * (0.2 * difficulty);
                                }
                            }
                        }
                    }
                }
            }
            
            // 7. تشجيع الحركة التي تخلق تهديداً مزدوجاً (للمستويات العالية)
            if (difficulty >= 4) {
                let threatCount = 0;
                for (let i = 0; i < 8; i++) {
                    for (let j = 0; j < 8; j++) {
                        const enemy = tempBoard[i][j];
                        if (enemy && enemy.color !== move.piece.color) {
                            if (isMoveValidBasic(tempBoard[move.to.row][move.to.col], move.to.row, move.to.col, i, j, tempBoard) &&
                                isMoveSafe(tempBoard[move.to.row][move.to.col], move.to.row, move.to.col, i, j, tempBoard)) {
                                threatCount++;
                            }
                        }
                    }
                }
                score += threatCount * 12;
            }
            
            return score;
        }
        
        function botMove() {
            if(gameOver || isAnimating || pendingPromotion || gameMode!=='bot' || currentTurn!=='black') return;
            
            const moves = getAllValidMoves('black', board);
            if(moves.length === 0){
                let state = getGameState('black', board);
                if(state === 'checkmate'){ gameOver=true; winner='white'; }
                else if(state === 'stalemate'){ gameOver=true; winner=null; }
                renderBoard(); updateUI();
                return;
            }
            
            // تقييم كل الحركات باستخدام الدالة المحسنة مع مستوى الصعوبة الحالي
            let scoredMoves = moves.map(move => ({
                move: move,
                score: evaluateBotMove(move, board, botDifficulty)
            }));
            
            // ترتيب حسب النقاط تنازلياً
            scoredMoves.sort((a,b) => b.score - a.score);
            let bestScore = scoredMoves[0].score;
            let bestMoves = scoredMoves.filter(sm => sm.score === bestScore);
            
            let chosen = null;
            if (botDifficulty === 1) {
                // مستوى سهل: عشوائي تماماً
                chosen = moves[Math.floor(Math.random() * moves.length)];
            } else {
                // المستويات 2-5: اختر من أفضل الحركات مع عشوائية طفيفة حسب المستوى، مع زيادة التركيز على الأفضل كلما زاد المستوى
                if (botDifficulty === 2 && bestMoves.length > 1) {
                    let topTwo = bestMoves.slice(0, Math.min(2, bestMoves.length));
                    chosen = topTwo[Math.floor(Math.random() * topTwo.length)].move;
                } else if (botDifficulty === 3 && bestMoves.length > 2) {
                    let topThree = bestMoves.slice(0, Math.min(3, bestMoves.length));
                    chosen = topThree[Math.floor(Math.random() * topThree.length)].move;
                } else if (botDifficulty === 4 && bestMoves.length > 1) {
                    // مستوى 4: يميل بشدة لأفضل حركة لكن قد يختار من أول حركتين أحياناً
                    let topTwo = bestMoves.slice(0, Math.min(2, bestMoves.length));
                    chosen = topTwo[Math.floor(Math.random() * topTwo.length)].move;
                } else {
                    chosen = bestMoves[0].move;
                }
            }
            
            if (chosen) {
                animateMove(chosen.from.row, chosen.from.col, chosen.to.row, chosen.to.col, null);
            }
        }
        
        let boardContainer = null;
        let squares = Array(8).fill().map(()=>Array(8));
        
        function renderBoard() {
            if(!boardContainer) return;
            for(let i=0;i<8;i++){
                for(let j=0;j<8;j++){
                    const sq = squares[i][j];
                    if(!sq) continue;
                    const piece = board[i][j];
                    const oldImg = sq.querySelector('.piece-img');
                    const oldShadow = sq.querySelector('.shadow-img');
                    if(oldShadow) oldShadow.remove();
                    if(oldImg) oldImg.remove();
                    
                    if(piece){
                        const imgKey = piece.imageKey || `${piece.color}_${piece.type}`;
                        let imgUrl = imageUrls[imgKey];
                        if(!imgUrl && piece.color==='white') imgUrl = imageUrls['white_pawn1'];
                        if(!imgUrl && piece.color==='black') imgUrl = imageUrls['black_pawn1'];
                        const imgElem = document.createElement('img');
                        imgElem.src = imgUrl;
                        imgElem.className = 'piece-img';
                        imgElem.draggable = false;
                        sq.appendChild(imgElem);
                        const shadow = document.createElement('img');
                        shadow.src = imgUrl;
                        shadow.className = 'shadow-img';
                        shadow.style.pointerEvents = 'none';
                        sq.insertBefore(shadow, imgElem);
                    }
                    sq.classList.remove('selected','valid-move');
                    if(selectedRow===i && selectedCol===j) sq.classList.add('selected');
                    if(validMoves.some(m=>m.row===i && m.col===j)) sq.classList.add('valid-move');
                }
            }
        }
        
        function showPromotionDialog(color, callback){
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal';
            const pieces = [
                { type: 'queen', name: 'ملكة', imgKey: `${color}_queen` },
                { type: 'rook', name: 'رخ', imgKey: `${color}_rook1` },
                { type: 'bishop', name: 'فيل', imgKey: `${color}_bishop1` },
                { type: 'knight', name: 'حصان', imgKey: `${color}_knight1` }
            ];
            let optionsHtml = '';
            pieces.forEach(p => {
                optionsHtml += `
                    <div class="promotion-piece" data-type="${p.type}">
                        <img src="${imageUrls[p.imgKey]}" alt="${p.name}">
                        <div>${p.name}</div>
                    </div>
                `;
            });
            modalDiv.innerHTML = `
                <div class="modal-content">
                    <h3>اختر قطعة الترقية</h3>
                    <div class="promotion-options">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            document.querySelectorAll('.promotion-piece').forEach(el => {
                el.onclick = () => {
                    const type = el.dataset.type;
                    modalDiv.remove();
                    callback(type);
                };
            });
        }
        
        function animateMove(fromRow,fromCol,toRow,toCol,callback){
            if(isAnimating){
                animationQueue.push({fromRow,fromCol,toRow,toCol,callback});
                return;
            }
            const pieceData = board[fromRow][fromCol];
            if(!pieceData){ if(callback) callback(false); return; }
            
            const sourceSquare = squares[fromRow][fromCol];
            if(sourceSquare){
                const originalImg = sourceSquare.querySelector('.piece-img');
                const originalShadow = sourceSquare.querySelector('.shadow-img');
                if(originalImg) originalImg.style.display = 'none';
                if(originalShadow) originalShadow.style.display = 'none';
            }
            
            isAnimating = true;
            
            const boardRect = boardContainer.getBoundingClientRect();
            const squareW = boardRect.width / 8;
            const startRect = squares[fromRow][fromCol].getBoundingClientRect();
            const endRect = squares[toRow][toCol].getBoundingClientRect();
            
            const imgKey = pieceData.imageKey || `${pieceData.color}_${pieceData.type}`;
            let imgUrl = imageUrls[imgKey];
            if(!imgUrl) imgUrl = pieceData.color==='white'? imageUrls.white_pawn1 : imageUrls.black_pawn1;
            const flyingImg = document.createElement('img');
            flyingImg.src = imgUrl;
            flyingImg.style.width = '100%';
            flyingImg.style.height = '100%';
            flyingImg.style.objectFit = 'contain';
            const flyingDiv = document.createElement('div');
            flyingDiv.className = 'piece-moving';
            flyingDiv.style.position = 'fixed';
            flyingDiv.style.left = `${startRect.left}px`;
            flyingDiv.style.top = `${startRect.top}px`;
            flyingDiv.style.width = `${squareW}px`;
            flyingDiv.style.height = `${squareW}px`;
            flyingDiv.appendChild(flyingImg);
            document.body.appendChild(flyingDiv);
            
            const deltaX = endRect.left - startRect.left;
            const deltaY = endRect.top - startRect.top;
            flyingDiv.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            requestAnimationFrame(()=>{
                flyingDiv.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            });
            
            setTimeout(()=>{
                flyingDiv.remove();
                let result = applyMoveWithPromotion(fromRow,fromCol,toRow,toCol);
                if(result === 'need_promotion'){
                    const promoColor = pendingPromotion.color;
                    // إذا كان الوضع ضد البوت والترقية للأسود (الروبوت) نختار ملكة تلقائياً لتحسين القوة (ذكاء)
                    if(gameMode === 'bot' && promoColor === 'black') {
                        // الروبوت يختار أفضل قطعة للترقية وهي الملكة (لزيادة فرص الفوز)
                        completePromotion('queen');
                        renderBoard();
                        updateUI();
                        isAnimating = false;
                        if(callback) callback(true);
                        if(animationQueue.length){
                            let next = animationQueue.shift();
                            animateMove(next.fromRow,next.fromCol,next.toRow,next.toCol,next.callback);
                        } else {
                            if(gameMode==='bot' && !gameOver && currentTurn==='black'){
                                setTimeout(()=>botMove(), 150);
                            }
                        }
                    } else {
                        showPromotionDialog(promoColor, (pieceType) => {
                            completePromotion(pieceType);
                            renderBoard();
                            updateUI();
                            isAnimating = false;
                            if(callback) callback(true);
                            if(animationQueue.length){
                                let next = animationQueue.shift();
                                animateMove(next.fromRow,next.fromCol,next.toRow,next.toCol,next.callback);
                            } else {
                                if(gameMode==='bot' && !gameOver && currentTurn==='black'){
                                    setTimeout(()=>botMove(), 150);
                                }
                            }
                        });
                    }
                    return;
                }
                renderBoard();
                updateUI();
                isAnimating = false;
                if(callback) callback(true);
                if(animationQueue.length){
                    let next = animationQueue.shift();
                    animateMove(next.fromRow,next.fromCol,next.toRow,next.toCol,next.callback);
                } else {
                    if(gameMode==='bot' && !gameOver && currentTurn==='black'){
                        setTimeout(()=>botMove(), 150);
                    }
                }
            }, 260);
        }
        
        function onSquareClick(row,col){
            if(gameOver || isAnimating || pendingPromotion) return;
            if(gameMode==='bot' && currentTurn !== 'white') return;
            
            if(selectedRow===null){
                const piece = board[row][col];
                if(piece && piece.color === currentTurn){
                    selectedRow = row; selectedCol = col;
                    validMoves = [];
                    for(let i=0;i<8;i++) for(let j=0;j<8;j++){
                        if(isMoveValidBasic(piece,row,col,i,j,board) && isMoveSafe(piece,row,col,i,j,board)){
                            validMoves.push({row:i,col:j});
                        }
                    }
                    renderBoard();
                } else {
                    if(selectedRow!==null){ selectedRow=null; validMoves=[]; renderBoard(); }
                }
            } else {
                const isValid = validMoves.some(m=>m.row===row && m.col===col);
                if(isValid){
                    const fRow=selectedRow, fCol=selectedCol;
                    selectedRow=null; validMoves=[];
                    animateMove(fRow,fCol,row,col, null);
                } else {
                    selectedRow=null; validMoves=[];
                    renderBoard();
                }
            }
        }
        
        function updateUI(){
            const turnSpan = document.getElementById('turnText');
            const statusSpan = document.getElementById('statusText');
            if(turnSpan) turnSpan.innerHTML = currentTurn==='white' ? '⚪ دور الأبيض' : '⚫ دور الأسود';
            if(statusSpan){
                if(gameOver){
                    if(winner==='white') statusSpan.innerHTML = '🏆 الفوز للأبيض! 🏆';
                    else if(winner==='black') statusSpan.innerHTML = '🏆 الفوز للأسود! 🏆';
                    else statusSpan.innerHTML = '🤝 تعادل! 🤝';
                } else {
                    if(isKingInCheck(currentTurn,board)) statusSpan.innerHTML = '⚠️ كش !! ⚠️';
                    else statusSpan.innerHTML = '🎯 جاري اللعب 🎯';
                }
            }
        }
        
        function resetGame(){
            if(isAnimating || pendingPromotion) return;
            initBoardData();
            currentTurn = 'white';
            selectedRow = null; selectedCol = null;
            validMoves = [];
            gameOver = false;
            winner = null;
            enPassantTarget = null;
            renderBoard();
            updateUI();
            if(gameMode==='bot' && currentTurn==='black') setTimeout(()=>botMove(),200);
        }
        
        function exitToMenu(){
            if(isAnimating || pendingPromotion) return;
            document.getElementById('menuScreen').style.display = 'block';
            document.getElementById('gameScreen').style.display = 'none';
            gameMode = null;
            selectedRow=null;
            validMoves=[];
        }
        
        function startGame(mode, diff=3){
            gameMode = mode;
            if(mode==='bot') botDifficulty = diff;
            initBoardData();
            currentTurn = 'white';
            selectedRow=null; validMoves=[]; gameOver=false; winner=null;
            enPassantTarget = null;
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            createBoardDOM();
            updateUI();
            if(gameMode==='bot' && currentTurn==='black') setTimeout(()=>botMove(),200);
        }
        
        function createBoardDOM() {
            const wrapper = document.querySelector('.game-wrapper');
            const oldBoard = document.getElementById('chessBoardDom');
            if(oldBoard) oldBoard.remove();
            const boardDiv = document.createElement('div');
            boardDiv.id = 'chessBoardDom';
            boardDiv.className = 'chess-board img-container';
            for(let r=0;r<8;r++){
                for(let c=0;c<8;c++){
                    const square = document.createElement('div');
                    square.className = `square ${(r+c)%2===0 ? 'light' : 'dark'}`;
                    square.dataset.row = r;
                    square.dataset.col = c;
                    square.addEventListener('mousedown', (function(row,col){ return function(){ onSquareClick(row,col); }; })(r,c));
                    boardDiv.appendChild(square);
                    squares[r][c] = square;
                }
            }
            wrapper.insertBefore(boardDiv, wrapper.firstChild);
            boardContainer = boardDiv;
            renderBoard();
        }
        
        function showDifficultyModal(){
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal';
            modalDiv.innerHTML = `
                <div class="modal-content">
                    <h3>🎯 اختر مستوى الذكاء (يتجنب الأكل ويحمي قطعه)</h3>
                    <select id="difficultySelectDom" class="difficulty-select">
                        <option value="1">⭐ مستوى 1 - سهل (عشوائي)</option>
                        <option value="2">⭐⭐ مستوى 2 - يهاجم ويحمي قليلاً</option>
                        <option value="3" selected>⭐⭐⭐ مستوى 3 - ذكي ويتجنب تعريض قطعه للأكل</option>
                        <option value="4">⭐⭐⭐⭐ مستوى 4 - خبير في الحماية والتهديدات</option>
                        <option value="5">⭐⭐⭐⭐⭐ مستوى 5 - أستاذ الحماية والأكل والتفوق التكتيكي</option>
                    </select>
                    <button id="confirmDifficultyDom" class="confirm-btn">✅ موافق</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
            document.getElementById('confirmDifficultyDom').onclick = ()=>{
                let val = parseInt(document.getElementById('difficultySelectDom').value);
                modalDiv.remove();
                startGame('bot', val);
            };
        }
        
        window.onload = ()=>{
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div id="menuScreen" class="main-menu">
                    <h1>♜ لعبة الشطرنج ♞</h1>
                    <p>X قتال حتى النهاية X</p>
                    <div class="menu-buttons">
                        <button class="menu-btn" id="vsBotBtnDom">🤖 ضد الروبوت</button>
                        <button class="menu-btn" id="twoPlayerBtnDom">👥 لاعبين</button>
                    </div>
                </div>
                <div id="gameScreen" class="game-wrapper" style="display:none;">
                    <div class="info-panel">
                        <div class="turn-indicator" id="turnText">⚪ دور الأبيض</div>
                        <div class="status" id="statusText">🎯 جاري اللعب 🎯</div>
                        <button class="action-btn" id="resetGameBtnDom">↺ إعادة</button>
                        <button class="action-btn" id="menuExitBtnDom">🏠 القائمة</button>
                    </div>
                </div>
            `;
            preloadImages(()=>{
                initBoardData();
            });
            document.getElementById('vsBotBtnDom').onclick = showDifficultyModal;
            document.getElementById('twoPlayerBtnDom').onclick = ()=>startGame('twoPlayer');
            document.getElementById('resetGameBtnDom').onclick = ()=>{ if(!isAnimating && !pendingPromotion) resetGame(); };
            document.getElementById('menuExitBtnDom').onclick = exitToMenu;
        };
    })();
</script>
</body>
